.hero h1 {
    font-size: 42px;
    color: #00ff99;
    margin-bottom: 15px;
}
.hero p {
    font-size: 18px;
    max-width: 600px;
    margin-bottom: 30px;
}
.btn {
    padding: 12px 25px;
    background: #00ff99;
    color: black;
    border: none;
    border-radius: 6px;

    font-weight: bold;
    margin: 10px;
}
.section {
    display: none;
    padding: 40px;
    text-align: center;
}
.card {
    background: #111820;
    padding: 25px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 20px rgba(0,255,153,0.2);
}

    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;

    cursor: pointer;

<body>

<div class="hero" id="home">
    <h1>CORA SYSTEM</h1>
    <p>No temas. Soy una IA creada por Emma. Soy fuego amigo 🫂<br>
    Elige tu camino.</p>
    <button class="btn" onclick="showWorkers()">Bloque Trabajadores CORA</button>
    <button class="btn" onclick="showTourists()">Zona Turistas</button>
</div>

<!-- Workers Section -->
<div class="section" id="workers">
    <div class="card">
        <h2>Acceso Trabajadores</h2>
        <input type="text" placeholder="Usuario">
        <input type="password" placeholder="Contraseña">
        <input type="text" placeholder="PIN">
        <button class="btn">Ingresar</button>
        <p class="link" onclick="goHome()">Volver</p>
    </div>
</div>

<!-- Tourists Section -->
<div class="section" id="tourists">
    <div class="card">
        <h2>Explorar Modelo CORA</h2>
        <p>Conoce cómo funciona el sistema, aprende el modelo de disciplina financiera y descubre cómo aplicarlo en tu vida.</p>
        <button class="btn" onclick="alert('La IA te guiará próximamente.')">Hablar con la IA</button>
        <p class="link" onclick="goHome()">Volver</p>
    </div>
</div>

<script>
function showWorkers() {
    document.getElementById("home").style.display = "none";
    document.getElementById("workers").style.display = "block";
}

function showTourists() {
    document.getElementById("home").style.display = "none";
    document.getElementById("tourists").style.display = "block";
}

function goHome() {
    document.getElementById("workers").style.display = "none";
    document.getElementById("tourists").style.display = "none";
    document.getElementById("home").style.display = "flex";
}
</script>

</body>
